<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>उमा टेक्निकल डिग्री कॉलेज | गोरखपुर</title>
  <!-- Google Fonts for Clean Looks -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;700&display=swap" rel="stylesheet">
  
  <style>
    /* Global Reset & Base Styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Noto Sans Devanagari', sans-serif;
    }
    
    body {
      background-color: #f4f7f6;
      color: #333;
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* 1. Top Strip (Notification Bar) */
    .topstrip {
      background: linear-gradient(90deg, #0F172A 0%, #1E293B 100%);
      color: #F1F5F9;
      font-size: 0.9rem;
      padding: 10px 0;
      font-weight: 500;
      border-bottom: 2px solid #F59E0B;
      width: 100%;
    }
    
    .topstrip .wrap {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .promo-text {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      background-color: #EF4444;
      border-radius: 50%;
      display: inline-block;
      animation: blink 1.2s infinite;
    }

    @keyframes blink {
      0% { opacity: 0.2; }
      50% { opacity: 1; }
      100% { opacity: 0.2; }
    }

    .phone-link {
      color: #FFFFFF;
      font-weight: 700;
      background: #D97706;
      padding: 6px 14px;
      border-radius: 6px;
      text-decoration: none;
      box-shadow: 0 2px 8px rgba(217, 119, 6, 0.3);
      font-size: 0.85rem;
    }

    /* 2. Main Header & Navigation */
    header.site {
      background: #ffffff;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
      position: sticky;
      top: 0;
      z-index: 1000;
      padding: 12px 0;
    }

    .navrow {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand-logo-link {
      display: block;
      text-decoration: none;
    }

    .main-logo {
      max-height: 55px; /* इमेज की हाइट को हेडर के अनुसार परफेक्ट फिट रखने के लिए */
      width: auto;
      display: block;
    }

    .links a {
      color: #4A5568;
      text-decoration: none;
      margin-left: 20px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .links a:hover {
      color: #2563EB;
    }

    .cta-call {
      background: #10B981;
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 700;
      box-shadow: 0 4px 6px rgba(16, 185, 129, 0.2);
    }

    /* Responsive adjustments */
    @media (max-width: 768px) {
      .topstrip .wrap, .navrow {
        flex-direction: column;
        text-align: center;
        gap: 12px;
      }
      .links {
        margin: 10px 0;
      }
      .links a {
        margin: 0 10px;
      }
    }
  </style>
</head>
<body>

  <!-- 1. Top Strip Added -->
  <div class="topstrip">
    <div class="wrap">
      <div class="promo-text">
        <span class="live-dot"></span>
        <span>🎯 सत्र 2026 एडमिशन ओपन: भारत सरकार द्वारा मान्यता प्राप्त ISO 9001:2015 संस्थान</span>
      </div>
      <a href="tel:+916306290994" class="phone-link">📞 डायरेक्ट एडमिशन हेल्पलाइन: +91-6306290994</a>
    </div>
  </div>

  <!-- 2. Main Header Container with the New Image Banner -->
  <header class="site">
    <div class="wrap navrow">
      <!-- इमेज बैनर यहाँ जोड़ा गया है -->
      <a href="#" class="brand-logo-link">
        <img src="logo.png" alt="Uma Technical Degree College Logo" class="main-logo">
      </a>
      
      <nav class="links">
        <a href="#courses">कोर्स लिस्ट</a>
        <a href="#offers">स्पेशल ऑफर</a>
        <a href="#about">प्रमाण पत्र</a>
        <a href="#gallery">गैलरी</a>
        <a href="#location">लोकेशन</a>
      </nav>
      <a class="cta-call" href="tel:+916306290994">📞 अभी बात करें</a>
    </div>
  </header>

  <!-- बाकी का वेबसाइट कंटेंट (Hero Section, Courses आदि) इसके नीचे आएगा -->

</body>
</html>
